<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Family packing checklist for Assateague State Park — June 2026.">
<meta name="theme-color" content="#1A4A57">
<title>Assateague Packing List</title>
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<style>
  :root {
    --sand: #F2EDE4;
    --dune: #D9CEB8;
    --ocean: #2A6B7C;
    --ocean-light: #E8F3F6;
    --ocean-dark: #1A4A57;
    --pony: #7A4F30;
    --pony-light: #F5EDE5;
    --text: #1C1C1C;
    --text-muted: #6B6560;
    --check: #2A7C5F;
    --check-light: #E6F5EF;
    --border: rgba(0,0,0,0.10);
    --cb-border: #847B6A;
    --radius: 8px;
    --radius-lg: 12px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  [hidden] { display: none !important; }

  body {
    font-family: 'Georgia', serif;
    background: var(--sand);
    color: var(--text);
    min-height: 100vh;
  }

  .visually-hidden {
    position: absolute;
    width: 1px; height: 1px;
    margin: -1px; padding: 0;
    overflow: hidden;
    clip: rect(0 0 0 0);
    white-space: nowrap;
    border: 0;
  }

  /* Header */
  header {
    background: var(--ocean-dark);
    color: white;
    padding: 2rem 1.5rem 1.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  header::before {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 18px;
    background: var(--sand);
    clip-path: ellipse(55% 100% at 50% 100%);
  }

  .header-eyebrow {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.78);
    margin-bottom: 0.5rem;
  }

  header h1 {
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    font-weight: normal;
    font-style: italic;
    letter-spacing: -0.01em;
    line-height: 1.15;
    color: white;
  }

  .header-meta {
    margin-top: 0.75rem;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    color: rgba(255,255,255,0.75);
    letter-spacing: 0.06em;
  }

  /* Sticky top bar: progress + filters */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 20;
    background: var(--sand);
    border-bottom: 1px solid var(--dune);
    padding: 0.6rem 0;
  }

  .progress-wrap {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 1.25rem;
  }

  .progress-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    margin-bottom: 0.45rem;
  }

  .progress-label {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.04em;
  }

  .top-actions { display: flex; gap: 6px; }

  .mini-btn {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 0.05em;
    color: var(--text-muted);
    background: white;
    border: 1px solid var(--border);
    border-radius: 99px;
    cursor: pointer;
    padding: 7px 12px;
    min-height: 32px;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
  }

  .mini-btn[aria-pressed="true"] {
    background: var(--ocean);
    border-color: var(--ocean);
    color: white;
  }

  .mini-btn.armed {
    background: #B3402F;
    border-color: #B3402F;
    color: white;
  }

  .progress-track {
    height: 5px;
    background: var(--dune);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: var(--check);
    border-radius: 99px;
    transition: width 0.35s ease;
    width: 0%;
  }

  /* Filters */
  .filters {
    max-width: 680px;
    margin: 0.6rem auto 0;
    padding: 0 1.25rem;
    display: flex;
    gap: 6px;
    flex-wrap: nowrap;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }

  .filters::-webkit-scrollbar { display: none; }

  .filter-btn {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    letter-spacing: 0.05em;
    background: white;
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 9px 14px;
    min-height: 38px;
    cursor: pointer;
    color: var(--text-muted);
    transition: all 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .filter-btn[aria-pressed="true"] {
    background: var(--ocean);
    border-color: var(--ocean);
    color: white;
  }

  /* Main content */
  main {
    max-width: 680px;
    margin: 1.25rem auto 4.5rem;
    padding: 0 1.25rem;
  }

  /* Section */
  .section { margin-bottom: 1.6rem; }

  .section-h { font-size: inherit; font-weight: normal; }

  .section-toggle {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 10px 0 8px;
    background: none;
    border: none;
    border-bottom: 1px solid var(--dune);
    margin-bottom: 10px;
    cursor: pointer;
    text-align: left;
    font-family: inherit;
  }

  .section-toggle:focus-visible {
    outline: 2px solid var(--ocean);
    outline-offset: 2px;
  }

  .section-icon {
    width: 26px;
    height: 26px;
    border-radius: 6px;
    background: var(--ocean-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .section-title {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ocean-dark);
    font-weight: bold;
  }

  .section-count {
    margin-left: auto;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    color: var(--text-muted);
  }

  .chevron {
    width: 8px;
    height: 8px;
    border-right: 1.5px solid var(--text-muted);
    border-bottom: 1.5px solid var(--text-muted);
    transform: rotate(45deg);
    transition: transform 0.15s;
    flex-shrink: 0;
    margin-bottom: 2px;
  }

  .section.collapsed .chevron { transform: rotate(-45deg); margin-bottom: -2px; }
  .section.collapsed .item-grid { display: none; }

  /* Keep focused elements from hiding under the sticky topbar */
  .item, .section-h, .add-row, .show-hidden { scroll-margin-top: 130px; }

  /* Item grid */
  .item-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 6px;
  }

  .item {
    display: flex;
    align-items: stretch;
    background: white;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    transition: background 0.12s, border-color 0.12s;
    user-select: none;
    min-height: 44px;
    overflow: hidden;
  }

  .item-main {
    flex: 1;
    min-width: 0;
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 8px 10px;
    cursor: pointer;
    border-radius: var(--radius);
  }

  .item-main:focus-visible {
    outline: 2px solid var(--ocean);
    outline-offset: -2px;
  }

  .item.checked {
    background: var(--check-light);
    border-color: rgba(42,124,95,0.2);
  }

  .item.checked .item-label {
    text-decoration: line-through;
    color: var(--text-muted);
  }

  .cb {
    width: 18px;
    height: 18px;
    min-width: 18px;
    border-radius: 4px;
    border: 1.5px solid var(--cb-border);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    background: white;
  }

  .item.checked .cb {
    background: var(--check);
    border-color: var(--check);
  }

  .cb-check {
    display: none;
    width: 10px;
    height: 7px;
    border-left: 2px solid white;
    border-bottom: 2px solid white;
    transform: rotate(-45deg) translate(1px, -1px);
  }

  .item.checked .cb-check { display: block; }

  .item-label {
    font-size: 15px;
    color: var(--text);
    line-height: 1.35;
    overflow-wrap: anywhere;
    min-width: 0;
  }

  .tag {
    font-family: 'Courier New', monospace;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 99px;
    margin-left: auto;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .tag-verify { background: var(--ocean-light); color: var(--ocean-dark); }
  .tag-kids { background: var(--pony-light); color: var(--pony); }
  .tag-cat { background: var(--dune); color: #585249; }

  /* Group-by segmented control */
  .viewbar {
    max-width: 680px;
    margin: 0.55rem auto 0;
    padding: 0 1.25rem;
    display: flex;
    align-items: center;
    gap: 9px;
  }

  .viewbar-label {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 0.05em;
    color: var(--text-muted);
  }

  .segmented {
    display: inline-flex;
    background: white;
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 2px;
  }

  .segmented button {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 0.05em;
    border: none;
    background: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 6px 13px;
    min-height: 32px;
    border-radius: 99px;
    transition: background 0.15s, color 0.15s;
  }

  .segmented button[aria-pressed="true"] { background: var(--ocean); color: white; }
  .segmented button:focus-visible { outline: 2px solid var(--ocean); outline-offset: 2px; }

  /* Location-group header manage buttons */
  .loc-head {
    display: flex;
    align-items: stretch;
    gap: 2px;
    border-bottom: 1px solid var(--dune);
    margin-bottom: 10px;
  }

  .loc-head .section-toggle { border-bottom: none; margin-bottom: 0; flex: 1; }

  .loc-mini {
    display: none;
    align-items: center;
    justify-content: center;
    width: 38px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 15px;
    flex-shrink: 0;
  }

  body.edit-mode .loc-mini { display: flex; }
  .loc-mini:focus-visible { outline: 2px solid var(--ocean); outline-offset: -2px; }
  .loc-delete-btn:hover { color: #B3402F; }

  .loc-rename-input {
    flex: 1;
    min-width: 0;
    font-family: inherit;
    font-size: 16px;
    padding: 7px 9px;
    border: 1px solid var(--ocean);
    border-radius: var(--radius);
    margin: 4px 0;
  }

  /* Location-view item: bag selector stacked under the row */
  .item.locview { flex-direction: column; align-items: stretch; }
  .item.locview .item-loctop { display: flex; align-items: stretch; min-height: 44px; }
  .item.locview .item-main { flex: 1; }
  .item.locview .item-delete { border-radius: 0; }

  .item-locctl {
    display: flex;
    align-items: center;
    gap: 8px;
    border-top: 1px solid var(--border);
    padding: 6px 10px;
    background: var(--sand);
  }

  .loc-pre {
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    flex-shrink: 0;
  }

  .item-loc-select {
    flex: 1;
    min-width: 0;
    font-family: inherit;
    font-size: 16px;
    padding: 7px 8px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: white;
    color: var(--text);
  }

  .item-loc-select:focus-visible { outline: 2px solid var(--ocean); outline-offset: -1px; }

  .loc-empty {
    grid-column: 1 / -1;
    font-size: 13px;
    color: var(--text-muted);
    font-style: italic;
    padding: 6px 2px 2px;
  }

  /* Delete / hide buttons */
  .item-delete {
    width: 40px;
    background: none;
    border: none;
    border-left: 1px solid var(--border);
    cursor: pointer;
    color: var(--text-muted);
    font-size: 18px;
    line-height: 1;
    flex-shrink: 0;
    border-radius: 0 var(--radius) var(--radius) 0;
  }

  .item-delete:focus-visible {
    outline: 2px solid var(--ocean);
    outline-offset: -2px;
  }

  .item-hide { display: none; }
  body.edit-mode .item-hide { display: block; }

  .show-hidden {
    grid-column: 1 / -1;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    color: var(--text-muted);
    background: none;
    border: 1px dashed var(--cb-border);
    border-radius: var(--radius);
    padding: 9px 10px;
    cursor: pointer;
    min-height: 38px;
  }

  /* Add item */
  .add-row { grid-column: 1 / -1; }

  .add-ghost {
    width: 100%;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    letter-spacing: 0.05em;
    color: var(--text-muted);
    background: none;
    border: 1px dashed var(--cb-border);
    border-radius: var(--radius);
    padding: 10px;
    min-height: 42px;
    cursor: pointer;
    text-align: left;
  }

  .add-live { display: flex; gap: 6px; }

  .add-item-input {
    flex: 1;
    min-width: 0;
    font-family: 'Georgia', serif;
    font-size: 16px;
    padding: 9px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: white;
    color: var(--text);
  }

  .add-item-input:focus-visible {
    outline: 2px solid var(--ocean);
    outline-offset: -1px;
  }

  .add-item-btn {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    letter-spacing: 0.05em;
    padding: 9px 16px;
    min-height: 44px;
    border-radius: var(--radius);
    border: 1px solid var(--ocean);
    background: var(--ocean);
    color: white;
    cursor: pointer;
    transition: background 0.12s;
  }

  /* Snackbar */
  .snackbar {
    position: fixed;
    left: 50%;
    bottom: 18px;
    transform: translateX(-50%);
    background: var(--text);
    color: white;
    font-size: 14px;
    padding: 11px 14px;
    border-radius: var(--radius-lg);
    display: flex;
    align-items: center;
    gap: 14px;
    z-index: 50;
    max-width: min(92vw, 480px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.25);
  }

  .snackbar button {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    letter-spacing: 0.05em;
    background: none;
    border: none;
    color: #8FD4C2;
    cursor: pointer;
    padding: 6px 8px;
    text-transform: uppercase;
  }

  .snack-text { overflow-wrap: anywhere; }

  /* Footer */
  footer {
    text-align: center;
    padding: 1.5rem;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    border-top: 1px solid var(--dune);
  }

  footer.storage-warning { color: #B3402F; font-weight: bold; }

  /* Hover only on devices that hover (no sticky highlight after taps) */
  @media (hover: hover) {
    .item:hover { background: #fafaf8; border-color: rgba(0,0,0,0.15); }
    .item.checked:hover { background: var(--check-light); }
    .filter-btn:hover { border-color: var(--ocean); color: var(--ocean); }
    .filter-btn[aria-pressed="true"]:hover { color: white; }
    .mini-btn:hover { border-color: var(--ocean); color: var(--ocean); }
    .mini-btn[aria-pressed="true"]:hover, .mini-btn.armed:hover { color: white; }
    .item-delete:hover { color: #B3402F; background: rgba(179,64,47,0.06); }
    .add-ghost:hover, .show-hidden:hover { border-color: var(--ocean); color: var(--ocean); }
    .add-item-btn:hover { background: var(--ocean-dark); }
    .segmented button:not([aria-pressed="true"]):hover { color: var(--ocean); }
    .loc-mini:hover { color: var(--ocean); }
    .loc-delete-btn:hover { color: #B3402F; }
  }

  /* Responsive */
  @media (max-width: 480px) {
    .item-grid { grid-template-columns: 1fr; }
    header { padding: 1.5rem 1rem 1.25rem; }
  }

  @media (prefers-reduced-motion: reduce) {
    .progress-bar, .item, .filter-btn, .chevron, .mini-btn { transition: none; }
  }
</style>
</head>
<body>

<header>
  <p class="header-eyebrow">Assateague State Park &nbsp;&middot;&nbsp; June 2026</p>
  <h1>Packing List</h1>
  <p class="header-meta">5 people &nbsp;&middot;&nbsp; 5&ndash;7 nights &nbsp;&middot;&nbsp; Camper rental</p>
</header>

<div class="topbar">
  <div class="progress-wrap">
    <div class="progress-top">
      <span class="progress-label" id="progress-label" aria-live="polite">0 of 0 packed</span>
      <span class="top-actions">
        <button class="mini-btn" id="edit-btn" type="button" aria-pressed="false">edit list</button>
        <button class="mini-btn" id="reset-btn" type="button">uncheck all</button>
      </span>
    </div>
    <div class="progress-track" role="progressbar" id="progress-track" aria-label="Packing progress" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
  </div>
  <div class="viewbar">
    <span class="viewbar-label">Group by</span>
    <span class="segmented" id="groupby" role="group" aria-label="Group items by">
      <button type="button" data-group="category" aria-pressed="true">Category</button>
      <button type="button" data-group="location" aria-pressed="false">Location</button>
    </span>
  </div>
  <div class="filters" id="filters" role="group" aria-label="Filter sections"></div>
</div>

<main id="main-list"></main>

<div class="visually-hidden" aria-live="polite" id="announcer"></div>
<div id="snackbar-host" role="status"></div>

<footer id="footer">Check off items as you pack &mdash; progress saves in your browser.</footer>

  health: ['hlth-firstaid','hlth-meds','hlth-kidsmeds','hlth-antihistamine','hlth-hydrocortisone','hlth-aloe','hlth-afterbite','hlth-thermometer','hlth-tweezers','hlth-sanitizer','hlth-lifejackets'],

  camp: ['camp-headlamps','camp-powerbanks','camp-lantern','camp-chairs','camp-mat','camp-table','camp-trashbags','camp-laundrypods','camp-ducttape','camp-games','camp-tablets','camp-dvd','camp-dvd','camp-chargers','camp-camera','camp-confirmation','camp-payment','camp-contacts'],
};

const STORAGE_KEY = 'assateague-packed-v3';
const LEGACY_KEY = 'assateague-packed-v2';
const MAX_LABEL = 120;
const MAX_CUSTOM_PER_SECTION = 50;
const MAX_LOCATIONS = 30;
const UNASSIGNED = '__unassigned__';

const SECTION_IDS = new Set(SECTIONS.map(s => s.id));
const ITEM_IDS = new Set(SECTIONS.flatMap(s => s.items.map(i => i.id)));
const SECTION_BY_ID = {};
SECTIONS.forEach(s => { SECTION_BY_ID[s.id] = s; });

// Starter packing locations (editable: rename/add/delete in the app). Seeded
// once on first load; the user can split "Family bags" into per-person bags.
const DEFAULT_LOCATIONS = [
  { id: 'loc-mybackpack', label: 'My backpack (Peak Design 45L)' },
  { id: 'loc-mytoiletry', label: 'My toiletry bag' },
  { id: 'loc-familybags', label: 'Family bags (per person)' },
  { id: 'loc-familytoiletry', label: 'Family toiletry bags' },
  { id: 'loc-trunk', label: 'Car trunk' },
];

// Smart pre-fill: a default location per category, with item-level overrides
// for valuables / electronics / personal carry that ride in my backpack.
const SECTION_DEFAULT_LOC = {
  beach: 'loc-trunk', bike: 'loc-trunk', hiking: 'loc-trunk', kitchen: 'loc-trunk',
  sleeping: 'loc-trunk', health: 'loc-mybackpack', hygiene: 'loc-familytoiletry',
  clothing: 'loc-familybags', camp: 'loc-trunk', camper: 'loc-trunk',
};
const ITEM_LOC_OVERRIDE = {
  'beach-phonepouch': 'loc-mybackpack', 'beach-drybags': 'loc-mybackpack',
  'hike-binoculars': 'loc-mybackpack', 'hike-maps': 'loc-mybackpack',
  'camp-powerbanks': 'loc-mybackpack', 'camp-chargers': 'loc-mybackpack',
  'camp-camera': 'loc-mybackpack', 'camp-tablets': 'loc-mybackpack',
  'camp-contacts': 'loc-mybackpack', 'camp-payment': 'loc-mybackpack',
  'camp-confirmation': 'loc-mybackpack', 'hlth-meds': 'loc-mybackpack',
  'hlth-firstaid': 'loc-mybackpack', 'hyg-glasses': 'loc-mytoiletry',
};

function defaultLocFor(itemId, secId) {
  return ITEM_LOC_OVERRIDE[itemId] || SECTION_DEFAULT_LOC[secId] || UNASSIGNED;
}

let state = { checked: {}, custom: {}, hidden: {}, collapsed: {}, location: {}, locations: [], groupBy: 'category', filter: 'all', editMode: false };
let storageWarned = false;

function load() {
  let raw = null;
  try { raw = localStorage.getItem(STORAGE_KEY); } catch (e) { warnStorage(); seedLocations(); return; }
  if (raw) {
    try {
      const p = JSON.parse(raw);
      let hadLocations = false;
      if (p && typeof p === 'object') {
        if (p.checked && typeof p.checked === 'object' && !Array.isArray(p.checked)) {
          for (const k in p.checked) if (p.checked[k] === true) state.checked[k] = true;
        }
        if (p.custom && typeof p.custom === 'object' && !Array.isArray(p.custom)) {
          for (const sid in p.custom) {
            if (!SECTION_IDS.has(sid) || !Array.isArray(p.custom[sid])) continue;
            const arr = p.custom[sid]
              .filter(it => it && typeof it.id === 'string' && typeof it.label === 'string' && !ITEM_IDS.has(it.id))
              .slice(0, MAX_CUSTOM_PER_SECTION)
              .map(it => ({ id: it.id, label: it.label.slice(0, MAX_LABEL) }));
            if (arr.length) state.custom[sid] = arr;
          }
        }
        if (p.hidden && typeof p.hidden === 'object' && !Array.isArray(p.hidden)) {
          for (const k in p.hidden) if (p.hidden[k] === true && ITEM_IDS.has(k)) state.hidden[k] = true;
        }
        if (p.collapsed && typeof p.collapsed === 'object' && !Array.isArray(p.collapsed)) {
          for (const k in p.collapsed) if (p.collapsed[k] === true && typeof k === 'string') state.collapsed[k] = true;
        }
        if ('locations' in p) {
          hadLocations = true;
          if (Array.isArray(p.locations)) {
            state.locations = p.locations
              .filter(l => l && typeof l.id === 'string' && typeof l.label === 'string')
              .slice(0, MAX_LOCATIONS)
              .map(l => ({ id: l.id, label: l.label.slice(0, MAX_LABEL) }));
          }
        }
        if (p.location && typeof p.location === 'object' && !Array.isArray(p.location)) {
          for (const k in p.location) if (typeof p.location[k] === 'string') state.location[k] = p.location[k];
        }
        if (p.groupBy === 'location' || p.groupBy === 'category') state.groupBy = p.groupBy;
      }
      if (!hadLocations) seedLocations();
    } catch (e) {
      // Corrupt v3: discard it and fall through to the v2 migration below,
      // which may still recover the pre-rewrite checkmarks.
      try { localStorage.removeItem(STORAGE_KEY); } catch (_) {}
      state.checked = {}; state.custom = {}; state.hidden = {}; state.collapsed = {};
      state.location = {}; state.locations = [];
      migrateV2();
      seedLocations();
    }
    return;
  }
  migrateV2();
  seedLocations();
}

// Seed the editable location list + smart per-item assignments. Only fills in
// what isn't already set, so it is safe to call after a v2/v3 load that has no
// location data without clobbering anything the user later edits.
function seedLocations() {
  if (!state.locations.length) state.locations = DEFAULT_LOCATIONS.map(l => ({ id: l.id, label: l.label }));
  const assign = (id, secId) => {
    if (state.location[id]) return;
    const loc = defaultLocFor(id, secId);
    if (loc !== UNASSIGNED) state.location[id] = loc;
  };
  SECTIONS.forEach(sec => sec.items.forEach(it => assign(it.id, sec.id)));
  for (const sid in state.custom) (state.custom[sid] || []).forEach(ci => assign(ci.id, sid));
  save();
}

function migrateV2() {
  try {
    const raw = localStorage.getItem(LEGACY_KEY);
    if (!raw) return;
    const old = JSON.parse(raw);
    if (!old || typeof old !== 'object') return;
    const oldChecked = (old.checked && typeof old.checked === 'object') ? old.checked : {};
    const oldCustom = (old.custom && typeof old.custom === 'object') ? old.custom : {};
    for (const k in oldChecked) {
      if (!oldChecked[k]) continue;
      if (k.indexOf('custom__') === 0) { state.checked[k.slice(8)] = true; continue; }
      const m = k.match(/^(.+)__(\d+)$/);
      if (m && MIGRATE[m[1]] && MIGRATE[m[1]][+m[2]]) state.checked[MIGRATE[m[1]][+m[2]]] = true;
    }
    for (const sid in oldCustom) {
      if (!SECTION_IDS.has(sid) || !Array.isArray(oldCustom[sid])) continue;
      const arr = oldCustom[sid]
        .filter(it => it && typeof it.id === 'string' && typeof it.label === 'string' && !ITEM_IDS.has(it.id))
        .slice(0, MAX_CUSTOM_PER_SECTION)
        .map(it => ({ id: it.id, label: it.label.slice(0, MAX_LABEL) }));
      if (arr.length) state.custom[sid] = arr;
    }
    save();
  } catch (e) {}
}

function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      checked: state.checked,
      custom: state.custom,
      hidden: state.hidden,
      collapsed: state.collapsed,
      location: state.location,
      locations: state.locations,
      groupBy: state.groupBy,
    }));
  } catch (e) { warnStorage(); }
}

function warnStorage() {
  if (storageWarned) return;
  storageWarned = true;
  const f = document.getElementById('footer');
  f.textContent = '⚠ Storage unavailable — progress will NOT be saved on this device.';
  f.classList.add('storage-warning');
}

function el(tag, cls, text) {
  const n = document.createElement(tag);
  if (cls) n.className = cls;
  if (text != null) n.textContent = text;
  return n;
}

function announce(msg) {
  const a = document.getElementById('announcer');
  a.textContent = '';
  setTimeout(() => { a.textContent = msg; }, 30);
}

function sectionStats(sec) {
  let total = 0, done = 0, hiddenCount = 0;
  sec.items.forEach(it => {
    if (state.hidden[it.id]) { hiddenCount++; return; }
    total++;
    if (state.checked[it.id]) done++;
  });
  (state.custom[sec.id] || []).forEach(ci => {
    total++;
    if (state.checked[ci.id]) done++;
  });
  return { total, done, hiddenCount };
}

// Every visible (non-hidden) item across all sections, built-in and custom,
// each tagged with its section id — the source list for the location view.
function allLiveItems() {
  const out = [];
  SECTIONS.forEach(sec => {
    sec.items.forEach(it => { if (!state.hidden[it.id]) out.push({ item: it, secId: sec.id, isCustom: false }); });
    (state.custom[sec.id] || []).forEach(ci => out.push({ item: ci, secId: sec.id, isCustom: true }));
  });
  return out;
}

// An item's location, treating a dangling reference (location since deleted)
// as Unassigned so deleting a bag cleanly drops its items into Unassigned.
function effectiveLoc(itemId) {
  const l = state.location[itemId];
  if (l && l !== UNASSIGNED && state.locations.some(x => x.id === l)) return l;
  return UNASSIGNED;
}

function locLabel(locId) {
  if (locId === UNASSIGNED) return 'Unassigned';
  const l = state.locations.find(x => x.id === locId);
  return l ? l.label : 'Unassigned';
}

function catLabel(secId) {
  const sec = SECTION_BY_ID[secId];
  return sec ? sec.short : '';
}

function buildItem(sec, item, isCustom) {
  const row = el('div', 'item' + (state.checked[item.id] ? ' checked' : ''));
  row.dataset.key = item.id;
  row.dataset.section = sec.id;
  row.dataset.group = sec.id;
  if (isCustom) row.dataset.custom = '1';

  const main = el('div', 'item-main');
  main.setAttribute('role', 'checkbox');
  main.setAttribute('aria-checked', String(!!state.checked[item.id]));
  main.tabIndex = 0;
  const cb = el('div', 'cb');
  cb.appendChild(el('div', 'cb-check'));
  main.appendChild(cb);
  main.appendChild(el('span', 'item-label', item.label));
  if (!isCustom && item.tag === 'verify') main.appendChild(el('span', 'tag tag-verify', 'verify'));
  if (!isCustom && item.tag === 'kids') main.appendChild(el('span', 'tag tag-kids', 'kids'));
  row.appendChild(main);

  const btn = el('button', isCustom ? 'item-delete' : 'item-delete item-hide', '×');
  btn.type = 'button';
  btn.setAttribute('aria-label', (isCustom ? 'Remove ' : 'Hide ') + item.label);
  row.appendChild(btn);
  return row;
}

function buildAddRow(sec) {
  const wrap = el('div', 'add-row');
  wrap.dataset.section = sec.id;
  const ghost = el('button', 'add-ghost', '+ Add item');
  ghost.type = 'button';
  wrap.appendChild(ghost);
  const live = el('div', 'add-live');
  live.hidden = true;
  const input = el('input', 'add-item-input');
  input.type = 'text';
  input.maxLength = MAX_LABEL;
  input.setAttribute('aria-label', 'Add item to ' + sec.label);
  input.placeholder = 'Add item...';
  live.appendChild(input);
  const btn = el('button', 'add-item-btn', 'Add');
  btn.type = 'button';
  live.appendChild(btn);
  wrap.appendChild(live);
  return wrap;
}

function buildSection(sec) {
  const s = el('section', 'section' + (state.collapsed[sec.id] ? ' collapsed' : ''));
  s.dataset.section = sec.id;
  s.dataset.group = sec.id;
  s.setAttribute('aria-labelledby', 'sec-' + sec.id);

  const h = el('h2', 'section-h');
  const tog = el('button', 'section-toggle');
  tog.type = 'button';
  tog.setAttribute('aria-expanded', String(!state.collapsed[sec.id]));
  tog.setAttribute('aria-controls', 'grid-' + sec.id);
  const ic = el('span', 'section-icon', sec.icon);
  ic.setAttribute('aria-hidden', 'true');
  tog.appendChild(ic);
  const title = el('span', 'section-title', sec.label);
  title.id = 'sec-' + sec.id;
  tog.appendChild(title);
  const stats = sectionStats(sec);
  const count = el('span', 'section-count', stats.done + '/' + stats.total);
  count.id = 'count-' + sec.id;
  tog.appendChild(count);
  tog.appendChild(el('span', 'chevron'));
  h.appendChild(tog);
  s.appendChild(h);

  const grid = el('div', 'item-grid');
  grid.id = 'grid-' + sec.id;
  grid.setAttribute('role', 'group');
  grid.setAttribute('aria-labelledby', 'sec-' + sec.id);
  sec.items.forEach(it => { if (!state.hidden[it.id]) grid.appendChild(buildItem(sec, it, false)); });
  (state.custom[sec.id] || []).forEach(ci => grid.appendChild(buildItem(sec, ci, true)));
  if (stats.hiddenCount > 0) {
    const sh = el('button', 'show-hidden', stats.hiddenCount + ' hidden — show');
    sh.type = 'button';
    sh.dataset.section = sec.id;
    grid.appendChild(sh);
  }
  grid.appendChild(buildAddRow(sec));
  s.appendChild(grid);
  return s;
}

function renderList() {
  const container = document.getElementById('main-list');
  if (state.groupBy === 'location') {
    renderLocationView(container);
  } else {
    const visible = SECTIONS.filter(sec => state.filter === 'all' || state.filter === sec.id);
    container.replaceChildren(...visible.map(buildSection));
  }
  updateProgress();
}

// --- Location view ---

function buildLocItem(secId, item, isCustom) {
  const row = el('div', 'item locview' + (state.checked[item.id] ? ' checked' : ''));
  row.dataset.key = item.id;
  row.dataset.section = secId;
  row.dataset.group = effectiveLoc(item.id);
  if (isCustom) row.dataset.custom = '1';

  const top = el('div', 'item-loctop');
  const main = el('div', 'item-main');
  main.setAttribute('role', 'checkbox');
  main.setAttribute('aria-checked', String(!!state.checked[item.id]));
  main.tabIndex = 0;
  const cb = el('div', 'cb');
  cb.appendChild(el('div', 'cb-check'));
  main.appendChild(cb);
  main.appendChild(el('span', 'item-label', item.label));
  main.appendChild(el('span', 'tag tag-cat', catLabel(secId)));
  if (!isCustom && item.tag === 'verify') main.appendChild(el('span', 'tag tag-verify', 'verify'));
  if (!isCustom && item.tag === 'kids') main.appendChild(el('span', 'tag tag-kids', 'kids'));
  top.appendChild(main);

  const del = el('button', isCustom ? 'item-delete' : 'item-delete item-hide', '×');
  del.type = 'button';
  del.setAttribute('aria-label', (isCustom ? 'Remove ' : 'Hide ') + item.label);
  top.appendChild(del);
  row.appendChild(top);

  const ctl = el('div', 'item-locctl');
  ctl.appendChild(el('span', 'loc-pre', 'BAG'));
  const sel = el('select', 'item-loc-select');
  sel.setAttribute('aria-label', 'Bag for ' + item.label);
  const cur = effectiveLoc(item.id);
  state.locations.forEach(l => {
    const o = el('option', null, l.label);
    o.value = l.id;
    if (l.id === cur) o.selected = true;
    sel.appendChild(o);
  });
  const ou = el('option', null, 'Unassigned');
  ou.value = UNASSIGNED;
  if (cur === UNASSIGNED) ou.selected = true;
  sel.appendChild(ou);
  ctl.appendChild(sel);
  row.appendChild(ctl);
  return row;
}

function buildLocGroup(group) {
  const collapsed = !!state.collapsed[group.id];
  const s = el('section', 'section' + (collapsed ? ' collapsed' : ''));
  s.dataset.group = group.id;
  s.setAttribute('aria-labelledby', 'sec-' + group.id);

  const h = el('h2', 'section-h loc-head');
  const tog = el('button', 'section-toggle');
  tog.type = 'button';
  tog.setAttribute('aria-expanded', String(!collapsed));
  tog.setAttribute('aria-controls', 'grid-' + group.id);
  const ic = el('span', 'section-icon', group.id === UNASSIGNED ? '❓' : '\u{1F9F3}');
  ic.setAttribute('aria-hidden', 'true');
  tog.appendChild(ic);
  const title = el('span', 'section-title', group.label);
  title.id = 'sec-' + group.id;
  tog.appendChild(title);
  const done = group.records.filter(r => state.checked[r.item.id]).length;
  const count = el('span', 'section-count', done + '/' + group.records.length);
  count.id = 'count-' + group.id;
  tog.appendChild(count);
  tog.appendChild(el('span', 'chevron'));
  h.appendChild(tog);

  if (group.id !== UNASSIGNED) {
    const ren = el('button', 'loc-mini loc-rename-btn', '✎');
    ren.type = 'button';
    ren.dataset.loc = group.id;
    ren.setAttribute('aria-label', 'Rename ' + group.label);
    h.appendChild(ren);
    const del = el('button', 'loc-mini loc-delete-btn', '×');
    del.type = 'button';
    del.dataset.loc = group.id;
    del.setAttribute('aria-label', 'Delete ' + group.label);
    h.appendChild(del);
  }
  s.appendChild(h);

  const grid = el('div', 'item-grid');
  grid.id = 'grid-' + group.id;
  grid.setAttribute('role', 'group');
  grid.setAttribute('aria-labelledby', 'sec-' + group.id);
  group.records.forEach(r => grid.appendChild(buildLocItem(r.secId, r.item, r.isCustom)));
  if (!group.records.length) {
    grid.appendChild(el('div', 'loc-empty', 'No items here yet — assign items from the BAG menu on any item.'));
  }
  s.appendChild(grid);
  return s;
}

function buildAddLocRow() {
  const wrap = el('div', 'add-row add-loc-row');
  const ghost = el('button', 'add-ghost add-loc-ghost', '+ Add a bag / location');
  ghost.type = 'button';
  wrap.appendChild(ghost);
  const live = el('div', 'add-live');
  live.hidden = true;
  const input = el('input', 'add-item-input');
  input.type = 'text';
  input.maxLength = MAX_LABEL;
  input.placeholder = 'Bag or location name...';
  input.setAttribute('aria-label', 'New bag or location name');
  live.appendChild(input);
  const btn = el('button', 'add-item-btn add-loc-btn', 'Add');
  btn.type = 'button';
  live.appendChild(btn);
  wrap.appendChild(live);
  return wrap;
}

function renderLocationView(container) {
  const byId = {};
  const groups = state.locations.map(l => { const g = { id: l.id, label: l.label, records: [] }; byId[l.id] = g; return g; });
  const unassigned = { id: UNASSIGNED, label: 'Unassigned', records: [] };
  allLiveItems().forEach(rec => { (byId[effectiveLoc(rec.item.id)] || unassigned).records.push(rec); });

  let all = groups.concat([unassigned]);
  if (state.filter !== 'all') all = all.filter(g => g.id === state.filter);
  else all = all.filter(g => g.id !== UNASSIGNED || g.records.length);

  container.replaceChildren(...all.map(buildLocGroup), buildAddLocRow());
}

function updateSectionCount(groupId) {
  const elc = document.getElementById('count-' + groupId);
  if (!elc) return;
  if (state.groupBy === 'category') {
    const sec = SECTION_BY_ID[groupId];
    if (sec) { const stats = sectionStats(sec); elc.textContent = stats.done + '/' + stats.total; }
  } else {
    const recs = allLiveItems().filter(r => effectiveLoc(r.item.id) === groupId);
    const done = recs.filter(r => state.checked[r.item.id]).length;
    elc.textContent = done + '/' + recs.length;
  }
}

function updateProgress() {
  let total = 0, done = 0;
  SECTIONS.forEach(sec => {
    const stats = sectionStats(sec);
    total += stats.total;
    done += stats.done;
  });
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById('progress-label').textContent = done + ' of ' + total + ' packed';
  document.getElementById('progress-bar').style.width = pct + '%';
  const track = document.getElementById('progress-track');
  track.setAttribute('aria-valuenow', String(pct));
  track.setAttribute('aria-valuetext', done + ' of ' + total + ' packed');
}

function toggleItem(row) {
  const id = row.dataset.key;
  if (state.checked[id]) delete state.checked[id];
  else state.checked[id] = true;
  save();
  const isChecked = !!state.checked[id];
  row.classList.toggle('checked', isChecked);
  row.querySelector('.item-main').setAttribute('aria-checked', String(isChecked));
  updateSectionCount(row.dataset.group);
  updateProgress();
}

// Snackbar with undo. The host is a persistent role=status live region (a
// dynamically inserted live region is not reliably announced); auto-dismiss
// is deferred while focus is inside so keyboard users can reach Undo.
let snackTimer = null;
function showSnack(text, undoLabel, undoFn) {
  hideSnack();
  const host = document.getElementById('snackbar-host');
  const bar = el('div', 'snackbar');
  bar.id = 'snackbar';
  bar.appendChild(el('span', 'snack-text', text));
  if (undoFn) {
    const u = el('button', null, undoLabel || 'Undo');
    u.type = 'button';
    u.addEventListener('click', () => { hideSnack(); undoFn(); });
    bar.appendChild(u);
  }
  host.appendChild(bar);
  armSnackTimer();
}

function armSnackTimer() {
  snackTimer = setTimeout(() => {
    const host = document.getElementById('snackbar-host');
    if (host.contains(document.activeElement)) { armSnackTimer(); return; }
    hideSnack();
  }, 8000);
}

function hideSnack() {
  if (snackTimer) { clearTimeout(snackTimer); snackTimer = null; }
  document.getElementById('snackbar-host').replaceChildren();
}

function focusSnackUndo() {
  const u = document.querySelector('#snackbar button');
  if (u) u.focus();
}

function removeCustomItem(row) {
  const secId = row.dataset.section;
  const id = row.dataset.key;
  const list = state.custom[secId] || [];
  const idx = list.findIndex(it => it.id === id);
  if (idx === -1) return;
  const removed = list.splice(idx, 1)[0];
  const wasChecked = !!state.checked[id];
  const prevLoc = state.location[id];
  delete state.checked[id];
  delete state.location[id];
  save();
  const hadFocus = row.contains(document.activeElement);
  const groupId = row.dataset.group;
  row.remove();
  updateSectionCount(groupId);
  updateProgress();
  announce('Removed ' + removed.label);
  showSnack('Removed “' + removed.label + '”', 'Undo', () => {
    if (!state.custom[secId]) state.custom[secId] = [];
    state.custom[secId].splice(Math.min(idx, state.custom[secId].length), 0, removed);
    if (wasChecked) state.checked[id] = true;
    if (prevLoc) state.location[id] = prevLoc;
    save();
    renderList();
  });
  if (hadFocus) focusSnackUndo();
}

function hideBuiltinItem(row) {
  const secId = row.dataset.section;
  const id = row.dataset.key;
  const sec = SECTIONS.find(s => s.id === secId);
  const item = sec && sec.items.find(it => it.id === id);
  if (!item) return;
  state.hidden[id] = true;
  save();
  renderList();
  announce('Hid ' + item.label);
  showSnack('Hidden “' + item.label + '” — no longer counts toward progress', 'Undo', () => {
    delete state.hidden[id];
    save();
    renderList();
  });
  const sh = document.querySelector('.show-hidden[data-section="' + secId + '"]');
  if (sh) sh.focus();
}

function unhideSection(secId) {
  const sec = SECTIONS.find(s => s.id === secId);
  if (!sec) return;
  sec.items.forEach(it => { delete state.hidden[it.id]; });
  save();
  renderList();
  announce('Restored hidden items in ' + sec.label);
  const tog = document.querySelector('.section[data-section="' + secId + '"] .section-toggle');
  if (tog) tog.focus();
}

function toggleCollapse(sectionEl) {
  const gid = sectionEl.dataset.group;
  const collapsed = !state.collapsed[gid];
  if (collapsed) state.collapsed[gid] = true;
  else delete state.collapsed[gid];
  save();
  sectionEl.classList.toggle('collapsed', collapsed);
  sectionEl.querySelector('.section-toggle').setAttribute('aria-expanded', String(!collapsed));
}

function openAdd(addRow) {
  addRow.querySelector('.add-ghost').hidden = true;
  const live = addRow.querySelector('.add-live');
  live.hidden = false;
  live.querySelector('.add-item-input').focus();
}

function closeAdd(addRow) {
  const live = addRow.querySelector('.add-live');
  live.querySelector('.add-item-input').value = '';
  live.hidden = true;
  const ghost = addRow.querySelector('.add-ghost');
  ghost.hidden = false;
  ghost.focus();
}

function submitAdd(addRow) {
  const secId = addRow.dataset.section;
  const sec = SECTIONS.find(s => s.id === secId);
  const input = addRow.querySelector('.add-item-input');
  const label = input.value.trim().slice(0, MAX_LABEL);
  if (!label) { input.focus(); return; }
  if ((state.custom[secId] || []).length >= MAX_CUSTOM_PER_SECTION) {
    showSnack('This section is full — remove some custom items first.');
    return;
  }
  if (!state.custom[secId]) state.custom[secId] = [];
  const item = { id: 'c-' + secId + '-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 7), label: label };
  state.custom[secId].push(item);
  const defLoc = defaultLocFor(item.id, secId);
  if (defLoc !== UNASSIGNED) state.location[item.id] = defLoc;
  save();
  const row = buildItem(sec, item, true);
  addRow.parentNode.insertBefore(row, addRow);
  updateSectionCount(secId);
  updateProgress();
  announce('Added ' + label + ' to ' + sec.label);
  input.value = '';
  input.focus();
  row.scrollIntoView({ block: 'nearest' });
}

// --- Top bar: filters, edit mode, reset ---

function buildFilters() {
  const wrap = document.getElementById('filters');
  const mk = (id, label) => {
    const b = el('button', 'filter-btn', label);
    b.type = 'button';
    b.dataset.filter = id;
    b.setAttribute('aria-pressed', String(state.filter === id));
    return b;
  };
  if (state.groupBy === 'location') {
    wrap.setAttribute('aria-label', 'Filter locations');
    wrap.replaceChildren(mk('all', 'All'), ...state.locations.map(l => mk(l.id, l.label)), mk(UNASSIGNED, 'Unassigned'));
  } else {
    wrap.setAttribute('aria-label', 'Filter sections');
    wrap.replaceChildren(mk('all', 'All'), ...SECTIONS.map(s => mk(s.id, s.short)));
  }
}

function setFilter(filter) {
  state.filter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.setAttribute('aria-pressed', String(b.dataset.filter === filter));
  });
  renderList();
  if (filter === 'all') { announce('Showing all'); return; }
  announce('Showing ' + (state.groupBy === 'location' ? locLabel(filter) : (SECTION_BY_ID[filter] ? SECTION_BY_ID[filter].label : filter)));
}

function setGroupBy(mode) {
  if (mode === state.groupBy) return;
  state.groupBy = mode;
  state.filter = 'all';
  save();
  document.querySelectorAll('#groupby button').forEach(b => b.setAttribute('aria-pressed', String(b.dataset.group === mode)));
  buildFilters();
  renderList();
  announce(mode === 'location' ? 'Grouped by packing location' : 'Grouped by category');
}

function reassignLocation(itemId, locId) {
  if (locId === UNASSIGNED) delete state.location[itemId];
  else state.location[itemId] = locId;
  save();
  renderList();
  const row = [...document.querySelectorAll('.item')].find(r => r.dataset.key === itemId);
  if (row) { const s = row.querySelector('.item-loc-select'); if (s) s.focus(); }
  announce('Moved to ' + locLabel(locId));
}

function submitAddLoc(addRow) {
  const input = addRow.querySelector('.add-item-input');
  const label = input.value.trim().slice(0, MAX_LABEL);
  if (!label) { input.focus(); return; }
  if (state.locations.length >= MAX_LOCATIONS) { showSnack('You already have the maximum number of locations.'); return; }
  const id = 'loc-c-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 7);
  state.locations.push({ id: id, label: label });
  save();
  buildFilters();
  renderList();
  announce('Added location ' + label);
  const ghost = document.querySelector('.add-loc-row .add-loc-ghost');
  if (ghost) ghost.focus();
}

function deleteLocation(locId) {
  const idx = state.locations.findIndex(l => l.id === locId);
  if (idx === -1) return;
  const removed = state.locations[idx];
  state.locations.splice(idx, 1);
  if (state.filter === locId) state.filter = 'all';
  save();
  buildFilters();
  renderList();
  announce('Deleted ' + removed.label + '. Its items are now unassigned.');
  showSnack('Deleted “' + removed.label + '”', 'Undo', () => {
    state.locations.splice(Math.min(idx, state.locations.length), 0, removed);
    save();
    buildFilters();
    renderList();
  });
}

function startRenameLocation(locId) {
  const sectionEl = [...document.querySelectorAll('.section')].find(s => s.dataset.group === locId);
  const loc = state.locations.find(l => l.id === locId);
  if (!sectionEl || !loc) return;
  const head = sectionEl.querySelector('.loc-head');
  const input = el('input', 'loc-rename-input');
  input.value = loc.label;
  input.maxLength = MAX_LABEL;
  input.setAttribute('aria-label', 'Rename location');
  head.replaceChildren(input);
  input.focus();
  input.select();
  let done = false;
  const commit = (keep) => {
    if (done) return;
    done = true;
    if (keep) {
      const v = input.value.trim().slice(0, MAX_LABEL);
      if (v) { loc.label = v; save(); buildFilters(); }
    }
    renderList();
  };
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); commit(true); }
    else if (e.key === 'Escape') { e.preventDefault(); commit(false); }
  });
  input.addEventListener('blur', () => commit(true));
}

let resetTimer = null;
function handleReset() {
  const btn = document.getElementById('reset-btn');
  if (!btn.classList.contains('armed')) {
    btn.classList.add('armed');
    btn.textContent = 'press again to confirm';
    announce('Press again to confirm unchecking all items');
    resetTimer = setTimeout(() => {
      btn.classList.remove('armed');
      btn.textContent = 'uncheck all';
      announce('Uncheck all cancelled');
    }, 8000);
    return;
  }
  clearTimeout(resetTimer);
  btn.classList.remove('armed');
  btn.textContent = 'uncheck all';
  const prev = state.checked;
  state.checked = {};
  save();
  renderList();
  announce('All items unchecked');
  showSnack('All items unchecked', 'Undo', () => {
    state.checked = prev;
    save();
    renderList();
  });
}

function toggleEditMode() {
  state.editMode = !state.editMode;
  const btn = document.getElementById('edit-btn');
  btn.setAttribute('aria-pressed', String(state.editMode));
  btn.textContent = state.editMode ? 'done editing' : 'edit list';
  document.body.classList.toggle('edit-mode', state.editMode);
  announce(state.editMode
    ? 'Edit mode on — hide items with ×, or rename and delete locations'
    : 'Edit mode off');
}

// --- Event delegation ---

document.getElementById('main-list').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (btn) {
    if (btn.classList.contains('item-delete')) {
      const row = btn.closest('.item');
      if (row.dataset.custom) removeCustomItem(row);
      else hideBuiltinItem(row);
      return;
    }
    if (btn.classList.contains('loc-delete-btn')) { deleteLocation(btn.dataset.loc); return; }
    if (btn.classList.contains('loc-rename-btn')) { startRenameLocation(btn.dataset.loc); return; }
    if (btn.classList.contains('section-toggle')) { toggleCollapse(btn.closest('.section')); return; }
    if (btn.classList.contains('show-hidden')) { unhideSection(btn.dataset.section); return; }
    if (btn.classList.contains('add-ghost')) { openAdd(btn.closest('.add-row')); return; }
    if (btn.classList.contains('add-loc-btn')) { submitAddLoc(btn.closest('.add-row')); return; }
    if (btn.classList.contains('add-item-btn')) { submitAdd(btn.closest('.add-row')); return; }
    return;
  }
  const main = e.target.closest('.item-main');
  if (main) toggleItem(main.closest('.item'));
});

document.getElementById('main-list').addEventListener('change', e => {
  const sel = e.target.closest('.item-loc-select');
  if (sel) reassignLocation(sel.closest('.item').dataset.key, sel.value);
});

document.getElementById('main-list').addEventListener('keydown', e => {
  if (e.key === 'Escape' && e.target.classList.contains('add-item-input')) {
    closeAdd(e.target.closest('.add-row'));
    return;
  }
  if (e.key !== 'Enter' && e.key !== ' ') return;
  if (e.target.classList.contains('add-item-input')) {
    if (e.key === 'Enter') {
      e.preventDefault();
      const ar = e.target.closest('.add-row');
      if (ar.classList.contains('add-loc-row')) submitAddLoc(ar);
      else submitAdd(ar);
    }
    return;
  }
  if (e.target.closest('button')) return; // native buttons activate themselves
  if (e.target.classList.contains('item-loc-select')) return; // native select handles keys
  const main = e.target.closest('.item-main');
  if (main) { e.preventDefault(); toggleItem(main.closest('.item')); }
});

document.getElementById('filters').addEventListener('click', e => {
  const b = e.target.closest('.filter-btn');
  if (b) setFilter(b.dataset.filter);
});

document.getElementById('groupby').addEventListener('click', e => {
  const b = e.target.closest('button');
  if (b) setGroupBy(b.dataset.group);
});

document.getElementById('reset-btn').addEventListener('click', handleReset);
document.getElementById('edit-btn').addEventListener('click', toggleEditMode);

// --- Boot ---

load();
document.querySelectorAll('#groupby button').forEach(b => b.setAttribute('aria-pressed', String(b.dataset.group === state.groupBy)));
buildFilters();
renderList();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
